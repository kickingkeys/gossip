{% extends "base.html" %}
{% block title %}Join {{ bot_name }}{% endblock %}
{% block content %}

{% if error %}
<div class="card">
    <h2>Oops</h2>
    <p class="error">{{ error }}</p>
</div>

{% elif group %}
<div class="card">
    <h1>{{ bot_name }}</h1>
    <p class="subtitle">wants to get to know you</p>
    <p class="desc">Join <strong>{{ group.name }}</strong> and let the bot learn what makes you gossip-worthy.</p>

    <form action="/onboard" method="post">
        <input type="hidden" name="invite_token" value="{{ invite_token }}">
        <input type="hidden" name="platform" value="discord">

        <label for="display_name">What's your name?</label>
        <input type="text" id="display_name" name="display_name" placeholder="Your first name" required>

        <label for="username">Your Discord username</label>
        <input type="text" id="username" name="username" placeholder="e.g. kickingkeys" required>

        <button type="submit">Join</button>
    </form>
</div>
{% endif %}

{% endblock %}
