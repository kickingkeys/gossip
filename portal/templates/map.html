{% extends "base.html" %}
{% block title %}{{ group_name }} — Map{% endblock %}
{% block content %}
<h1>{{ group_name }} — Member Locations</h1>
<div id="map" style="width:100%;height:500px;border-radius:8px;margin-top:16px;"></div>
<p id="status" style="margin-top:8px;color:#888;">Loading locations...</p>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
    var map = L.map('map').setView([39.8283, -98.5795], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19,
    }).addTo(map);

    function loadLocations() {
        fetch('/api/members')
            .then(r => r.json())
            .then(data => {
                var members = (data.members || []).filter(m => m.latitude && m.longitude);
                document.getElementById('status').textContent =
                    members.length ? members.length + ' members located' : 'No location data yet';

                members.forEach(function(m) {
                    L.marker([m.latitude, m.longitude])
                        .addTo(map)
                        .bindPopup('<b>' + m.name + '</b><br>' + (m.location_name || '') +
                            '<br><small>Updated: ' + (m.location_updated_at || 'unknown') + '</small>');
                });

                if (members.length > 0) {
                    var bounds = L.latLngBounds(members.map(m => [m.latitude, m.longitude]));
                    map.fitBounds(bounds, {padding: [50, 50]});
                }
            })
            .catch(function() {
                document.getElementById('status').textContent = 'Error loading locations';
            });
    }

    loadLocations();
    setInterval(loadLocations, 60000);
})();
</script>
{% endblock %}
